<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>byDevsforDevs</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        color: #1f2937;
      }

      .fallback-shell {
        max-width: 960px;
        margin: 0 auto;
        padding: 3rem 1rem 4rem;
      }

      .fallback-hero {
        background: #fff;
        border: 1px solid #dbe2ea;
        border-radius: 14px;
        padding: 2rem;
      }

      .fallback-hero h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      .fallback-hero p {
        margin: 0;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="fallback-shell">
        <section class="fallback-hero">
          <h1>byDevsforDevs</h1>
          <p>
            Frontend scaffold is ready. If Vue is not rendering, run the app with
            Vite instead of opening this file directly.
          </p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
